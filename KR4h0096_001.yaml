驛使還將進酒贈彭生秉德華燈照廣席錦瑟彈朱絲一彈再三嘆進酒卿莫辭丈夫成名垂不朽彭生早試穿楊手彩鳳朝鳴岡上桐驪駒莫繫門前柳門前柳條冬尚青城南桂漿翻玉缶觥船滿引百分勸出門不顧蓬中螢君不聞洛陽賈生對宣室長安公卿皆動色長安九衢橫九天爾如神駒當自力我昔侍從金門中誓師牧野初成功功成治定四海同條枚再見承平風爾行決科期第一狐裘蒙茸髮如漆莫辭更盡金屈巵直上排雲振雙翮短歌行與藍山陳彥中桂水秋風髙扁舟過蘋末西來佳公子袖拂湟川月公子芳年狐白裘抱琴來訪丹山丘雲邊舉手笑相揖凌雲意氣橫清秋髙談雅論傾四座自言曾到燕山遊雪中射虎隨飛將原上呼鷹從列侯酒酣馳向城南獵騰身飛鞚輕一瞥赤手獲得千年狐路人縱觀誇勇捷卿家嚴君誰得如湘南昔日専城居將門有將今復見見此滄波明月珠明珠白璧相照耀知音更學絲桐妙傳得吳儂子夜歌彈為楚客陽春調爾有吳越思言之使我迷罷琴惆悵孤月落哀猿老樹臨雙溪他年同泛山隂雪聽爾琴中烏夜啼題劉千户英武舟卷將軍十五二十時銀艾初懸雙珮垂材能不負將家子年少功成人所推青春照耀黃金鎧出入轅門好丰采湘南自昔産英豪况有雄名播滄海海波忽沸神鼇丘元戎萬舸橫中流霆轟電掃勢無敵遙見將軍英武舟將軍舟甚英武牙檣錦纜追風櫓半夜揚帆奏凱歌千夫擊楫鳴笳鼓自從歸駐北山邊兹事流傳又五年繡衣使者文章述大勝磨崖千仞鐫扶溪春望為鄺茂才賦溪頭望春春色深美人不見勞豫心緑波渺渺向南浦罨畫樓臺芳樹隂天涯滿目丹青障春日春花兩搖漾翡翠蘭苕不可思鴛鴦桂樹長相望相望相思雲路遙金塘流水亂春潮採菱風急桂舟晚疑是當年楊子橋橋邊楊柳青青好惆悵春心被花惱浦口回船欲訪君相思一夜蘼蕪老五言律詩寄道士蕭止菴二首昔寓朱明洞神游碧澗阿庭臨栖鶴樹衣拂掛猿蘿鳳吹清雲曲龍吟白雪歌仍慙勾漏令塵夢入槐柯頗棄人間事來參內景篇借騎緱嶺鶴相訪大羅仙稽首傳丹訣長歌入紫烟璚花不著處同掃石牀眠贈陳憲使還嘉興蘅臯理輕楫華筵餞逺人潮生碧海曙雨歇紅亭春適越遂辭祿還吳思問津超然不可企遙睇東山雲楊氏湛碧軒桂浦含秋氣蘿軒淡夕隂鷺窺明鏡徹雲度彩屏深宴坐消塵慮遐觀恣賞心羣賢思歷下吟嘯屬芳音送邵李二巡檢赴京驛樹殘朝雨汀潮急暝流旌麾從此别尊酒慰離憂虎石經銜箭龍門擬共舟蟾溪他夜月思爾玉京遊贈白守中之湖廣王孫芳草緑離思滿西州桂醑秦淮夕蘭橈江漢秋名藩今所重形勝昔無儔元規賓從美吟嘯在南樓五言排律詩詩僧杞上人得㫖歸鄱陽葬親二十二韻白下春容減紅亭麗日升暫邀藝閣彥相送草堂僧輦轂同文會旃檀異德稱詩名隨處滿華幄自天承久被宸衷眷仍推講座登離宮頻召對前席譽材能尚食供蒲饌禪宗問葛藤龍河朝洗鉢鹿苑夜傳燈般若翻神貝袈裟出御繒抽毫聯百詠揮塵竟三乘淨灑銀河水清㴠玉井氷虛空常湛湛行往獨兢兢陟屺懷芝壠瞻雲别蔣陵綸音旌孝德珍翰誄先堋寸草慈暉映雙林瑞露凝逍遙無俗慮攀餞有佳朋祖帳瓊花墜皇京寶樹層江流杯浩渺巖户錫飛騰綺散烟霞動珠含海水澄虎溪從惠逺牛渚待袁宏莫厭塵緣混終知雅頌興淡湖吟賞遍來就鶴書徵遊黃陂五十韻吾郡山川秀黃陂亦有名聞君談勝概邀我共遊行路指蒼崖近村臨碧澗縈塵囂辭澒洞丘壑願經營繚繞菱塘曲潺湲水碓清深泥緣狹徑積雨漲前坑陟涉衣裳濕扶攜杖屨輕陽雲迷靉靆欹石履崢嶸俗訝精靈異誰知唱和情林僧來問訊野老亦逢迎注碗金芽茗充庖玉笋羮敲推籬犬吠餽餉草雞烹少憩沾微醉前趨若有程土門斜束隘坡岸敞連坪石馬眠荒壠昭陵失廢塋騰蛟雙踴躍蹲豹互猙獰迢遞峰巒起穹窿窟竇鳴嶺麋超險峻潭鮪漾澄泓㶁㶁泉分潔欣欣卉並榮奔流寒漱玉磐石迥疑城避地傷前事窮途蹙逺征蟻柯塵業誤魚木禍羅嬰嵗月重登覽烟霞幾變更陳雷今合契黃綺舊同聲招隱依松桂尋芳拾杜蘅逍遙吟伐木談笑坐班荆鳳澗葳㽔合螺蜂宛轉明田家深處樂王政此時平雜沓歡樵採喧闐羡偶耕豐年饒芋栗膏壤足稌粳鼓腹雍熙叟居巢太古氓幽懷真可豁佳境實難并白鶴鳴相狎青猿戲不驚靜中無俗念方外有賢英蕙結靈均珮松號子晉笙仰窺懸瀑淨側度小橋橫茅舍藤穿牖柴窗竹覆楹花簷蜂陳陳桐巷鳥嚶嚶席帽看雲坐匏尊倚樹傾凉颸驅溽暑斜照弄新晴枕石延詩思臨流破宿酲疏慵聊翰墨沈湎愧瓶罌著屐隨康樂回車泣步兵祇應除世鞅端可脫塵纓趨走煩童御徉狂托弟兄橘中期四友林下憶三生絶德瓢須棄忘形席任爭𤣥言超混沌遐舉問蓬瀛瑶草行堪掇丹砂煉欲成他年求道侶即此締幽盟七言律詩贄相國李公善長吾君神武定中朝丞相勳名冠百僚漢室興王推鄧禹唐宗開國任房喬江淮草木知名舊吳越山川闢地遙好向龍樓扶赤日便觀麟閣近璇霄呈張昶參政絲綸閣下五雲飄政事堂中八座超班馬文章傳舊學䕫龍勳業慶新朝宮花露重金莖賜衢柳風清玉珮搖江海微生叨近侍也隨丹鳳舞簫韶呈汪朝宗參議龍飛江表仗能臣虎變淮陽有俊人幃幄春風勤夙夜藩垣南寄息風塵聞雞屢促鳴珂入倚馬仍看草檄頻越客狂名叨薦啓無因東閣拜平津北捷應制王師幾日定秦郵詔發竒兵出壽州橫海樓船通楚甸羽林旌節渡淮流胡笳慘動關山月戎帳威傳草木秋聞道鷹揚能奮迅思歸燕將莫夷猶送董文啓之江夏宰委珮晨看拜玉除西游真食武昌魚王孫碧草秋無際仙掌金莖露下初今日才名須卓茂當年詞賦說相如登臨若對南樓月待爾賓鴻寄尺書贈王深之官永康賞心亭下玉壺傾客裏難堪送客情沙際緑蕪朝雨淨天涯江樹晚雲平扁舟剡水因乘興髙䇿河汾舊有名勿謂微官淹驥足金華凉月對秋清正月初四日南郊禮成午夜祥雲繞太微聖明開運六龍飛簫韶享帝聲容麗玉帛來王厯數歸寶幄天光臨負扆金輿春色映垂衣儒臣幸覩唐虞際三祝堯年仰曙輝謁黃石公廟榆徑深深一草堂松階寂寂半斜陽青山逺近分齊魯黃石英靈閲漢唐碑斷螭龍荆棘暗壇空鸞鶴檜槐蒼鄉人更說傳書意故國風雲入渺茫舟泊龍灣寄孫仲衍吳檣楚柁十年間又慶秦淮虎豹關眼底故人成寂寞夢中塵業負髙間九州風雨東南會七澤波濤日夜還江上思君雲路杳掀篷秋對蔣陵山贈洗口于巡檢東郡于公最有名為儒曾事魯諸生鶴書三聘雲間下龍劒雙飛海上行明月畫船依桂浦碧山紅樹繞花營齊中舊客今誰在青眼相逢萬里情喜故人孫仲衍歸十年東去入皇都詞賦爭誇楚大夫疏散又辭金馬籍徉狂須覔步兵㕑花開上苑啼鸚鵡草緑南園泣鷓鴣惟愛碧山吟卷在夜隨明月照蓬壺贈戴雲十年慣聽京華雪忽憶聞雞夢覺時萬户曉鐘金氣應九重仙仗珮聲遲湟州桂樹誰招隱庾嶺梅花有所思一曲陽春知寡和郎官清勝浩然詩青宮哀詞懿文皇太子也前星光隕太微間雲闕龍歸不可攀慘結𤣥雲迷海嶽淚揮寒雨遍戎蠻清都鶴駕翺翔逺緱嶺鸞笙縹眇還遙想皇情哀慟處萬年松柏紫金山次韻仲衍巫峽秋懷白帝孤城蜀漢間錦江秋色隔巴山霜清灧澦璚瑶動雨散陽臺紫翠環王事歸心俱未已世情岐路總相關扁舟莫繫楓林下卧聽寒猿一夜還七言絶句從軍行贈費指揮使英雄江左費將軍淮海吳門舊䇿勳又領貔貅三百萬誓清沙漠報明君聞說沙場漸倒戈受降城北是灣河胡姬窈窕隨征馬虜酒葡萄載駱駝秋夜雜興金風瑟瑟吹明河鎖窗時見流螢過誰家玉笛生離怨知是吳儂子夜歌秦淮橋下江水清鳳凰臺前霜月明莫愁艇子繫何處楊柳蕭蕭無限情折楊柳枝詞戲贈朱文昭緑隂馳道繞隋宮拂雨撩烟送晚風萬樹千條都折盡不堪回首畫橋東游洪範池與劉文正洞門斜日照金潭千尺藤蘿掛石龕騎馬獨來髙處望滿山松柏似江南小塘山居淡月斜窗夜氣清禪栖無夢客燈明山中萬籟俱岑寂惟有松風答磬聲王孫挾彈圖樂遊原上競繁華騎出天南白鼻騧宮錦不愁清露濕五陵松柏絢朝霞馳道香莎剪翠茵金鞭間揚落花塵溫泉樹晚歌鍾起人識開元富貴春寄復初景翔諸友寒泉疏竹映清秋曾記仙人太乙舟今日逢君同感慨不堪衰淚灑西州荔枝原頭春水深多情得似玉郎心琵琶撥盡凉州曲石竹花殘風滿林題野塘景花落春塘急暝流湖光山色未銷憂雙雙白鳥忽飛去撩亂文鴛不自由廣州四先生詩卷一

body:
  text: 廣州四先生詩卷一雪篷詩選黃哲字庸之番禺人世為荔灣著姓哲弱冠而孤刻苦讀書通五經嘗借人文選手鈔之沈玩究竟遂能作詩造晉唐奧域性好山水結廬蒲澗栖息其中往來羅浮峽山南華諸名勝自以為未足乃辭家度庾嶺過吳楚游燕齊間一時湖海英豪皆與游焉當風雪時泊舟秦淮遇朱文昭涂穎輩相與握手吟咏沽酒大噱二人唶曰君才如闕雖知音如寡闕自是益有名龍鳳中太祖為吳王駐師金陵招徠賢士哲為丞相李善長參政張昶汪廣洋所知交荐之時已建吳國拜為翰林待制入書閣侍太子讀書尋兼翰林典韱輔導盡職丙午六月左丞相徐達北伐捷聞上命賦詩稱㫖及鍾山祈雨獲應御製七言詩志喜命哲賡之其見重如此洪武初奉使青徐諭諸反側尋出知山東東阿縣吏胥初以儒士易之哲剖決如流案牘無停者且不事繳繞苛察民樂其寬值旱詣洪範池祠禱詞㫖哀惻甘澍應時優洽民歡曰此黃公雨也狼溪有怪物善為幻能竊人啖之哲為文禱于天須臾風雨大作一青蛟斃水上邑人訝以為神時經毛貴亂後民多流徙他處聞哲善政復其業者亡慮數千人辛亥四月升東平府通判東阿士民遮道攀泣抵府境乃返是嵗黃河決梁山中書省發民疏濬哲董東平之役經畫有方民不告勞有司欲堰黃陵岡哲建議謂此乃元朝之敝政不可以為法事遂寢尋上疏陳時務數十事上怒其狂易會山東分省奏哲捐俸修先聖祠築水隄湖有成績乃釋不問哲亦乞歸得允既南還有司奏請領郡校事橫經授徒嵗凡數百人乙卯四月朝廷取回山東治在郡罣誤竟置于法郡邑人士家為奠祭哲始北上時倚篷聽雪常自詫曰天下竒音妙䪨出自然者莫是過也歸構一軒名聽雪篷學者稱曰雪篷先生子德輿輯其詩文十卷行于世嘗經昭明太子墓作詩弔之說者謂混選詩中殆不可甲乙其精工如此見廣州人物傳古樂府臨髙臺臨髙臺髙臺百仞凌雲開丹霞曙色明九垓咸陽王氣何佳哉交疏結綺紛崔嵬虹橋復道雲中來直過鳳樓表雙闕遙連北極正三階宛轉朱闌臨渭水蜚蜚朱閣通天起銅龍髙拱日華鮮青雀翻翻月明裏仙姝搖珮溢層城錦幄髙張翡翠屏寶鼎香酥調玉食金莖瑞露屑璚英璚英玉食知難老鸞鏡青蛾為君好君王八駿上瑶池日暮長門怨芳草芳草年年繞翠華瑶池歌管醉流霞皆傳阿母桃成實又獻安期棗似瓜蟠桃石棗真堪羡方朔詼諧侍歡宴題詩爭擬柏梁新求仙豈意桑田變願得層臺更萬重崑崙西望接崆峒能共赤松鞭彩鳳仍隨軒后駕蒼龍下顧凄凄茂陵道惟餘隴樹生秋風戰城南君不聞隂山敕勒川胡兒飲馬來翩翩狼頭大纛三萬落鸞𢎞注槊雄燕然烏桓古道黃沙塞青冢荒原白骨田漢將鷹揚遙度磧戎兵獸駭復窺邊邊烽夕照甘泉殿殺氣浮空白如練右地連營夜合圍左賢鳴鏑朝馳戰聞道嫖姚新築城先令都護出竒兵三門八陳互纏繞萬衆一心同死生偏裨轉鬭血凝肘箭鋒流星餓鴟吼卷甲遙搴大校旗橫戈怒落單于首愁雲慘日共亡胡敗馬號鳴霜草枯金裘寶玦青珊瑚玉貌花顔泣路隅含悲掩袂辭穹廬雕盤跪進紫駝酥軍中椎牛日髙會葡萄寒香濃不醉振旅先論衛霍功封侯未數金張貴封侯意本重雄豪誰識戰場汗馬勞惟有城南征戰地髑髏京觀長蓬蒿白苧詞長洲宮中花月輝彩雲夜傍瓊樓飛吳姬娉婷白苧衣揚蘭拂蕙春風歸花籌傳觴注紅玉月鏡當筵掩明燭低環按節宮調促嫣然一轉亂心曲夜長酒多歡未足驚烏啼向東苑樹星河闌干正當户明眸皓齒歌白苧蛾眉嬋娟花月妬含情奉君君莫顧雲中璧月易盈虧葉底穠華多盛衰願為寶階千嵗石長近君王雙履綦雉朝飛野田無人蒿草薄羣雉班班草中落五月禾熟桐風清南陂北陂聲喔喔東方漸髙晨露稀金翎繡項爭光輝桑畦如霧行不見雄鳴呼雌驚復飛渴飲幽澗泉饑啄野田粟羣雛來哺聲粥粥寧向郊原抱耿介不羡雲霄競髙逐魯恭慈仁桑隂自馴鰥㷀竊傷犢牧采薪下防虞羅上畏雕鶚朵頤垂涎羣動交虐聖人解網天網疏八紘山澤無畋漁蓬機艾弋無爾圖朝出陌上飛莫還蒿下居翼衆雛兮行且呼飲而啄兮寧爾軀雉兮雉兮樂何如慎勿變化陳倉為怪誣烏栖曲九月過姑蘇江頭霜草枯秋風吹葉盡愁殺夜栖烏栖烏月明裏霜重驚還起無處托安巢啞啞渡江水江波淺復深東去無還心白苧吳宮曲能成哀怨音只言歡樂長相保青春幾時秋又老可憐西子斷腸花不及虞姬美人草舞罷垂楊金縷衣椒房絳燭明星稀越騎爭馳海山動吳歌尚繞梁塵飛梁塵飛飛白苧哀烏啼夜半閶門開鴟夷浮江麋鹿來月明猶照姑蘇臺自君之出矣自君之出矣無處托鱗音思君如畫燭淚盡不明心五言古詩初入書閣呈董宗文博士兼簡同舍諸公河關歇王氣淮泗擅英靈天眷迪皇運人謀歸聖能石城雄虎踞鐘阜宛龍騰紫署𢎞東閣青門踐北陵來王玉帛至訪道蒲輪徵髦英起幽谷俊乂羅明庭變豹蔚華彩飛熊聞作興朝儀制述美錫賚恩庥承前席思賈誼橫經推戴憑奚為繞枝鵲亦企圖南鵬雲軒蠧簡輯蘭署鴛班升髙䇿屢懷董名流知慕膺追陪虎禁入被遇龍門登仍慙匠石顧用匪輿輪勝毋云棄樗朽庶以從規繩十一月十二日四望山陪祀禮成呈諸執事時北征也𤣥明開朔序禋類卜辰良武成遵誓命汾畤備馨香惟皇儼雍穆對越思洋洋凝旒仰坤壝授律挾乾綱風雲從龍虎樂舞登鳳凰圭幣有容秩緌纓紛煥煌苾芬既明誠肸蠁回穹蒼兹焉迪昌運赤伏臻遐祥徂征乃自葛義旅時鷹揚同德奮熊羆桓桓先啓行阿衡重麾鉞推轂觀旗常海岱仍率職堪輿復泰康繁祠陋衰典昭告紀興王羣英聿來助委珮鏘珩璜多儀動文彩列宿開榮光庸薾忝趨承賡歌聆頌章宸猷願終述豁達垂無疆過梁昭明太子墓帝子降南浦飄颻蒼桂隂神飈回震闕𤣥跡閟坤岑鳳陵輝璞藴龍沼媚珠沈文藻絢華黻芳芬揚素襟遺編軼正雅曠代馳徽音玉馬風雲變金鳬嵗月深霜蘭朝委翠烟蘿夕翳林采蘋思永薦捐玦遂幽尋靈修忽爾遊嵗晏勞豫心遼東鶴馭逺緱嶺鸞笙吟眇眇因懷昔營營徒慨今瑶華竟衰歇惆悵雍門琴送道士蔣玉壺還茅山華陽初慕道羽服依巖際辟穀咽晨霞朝元結真氣朗吟扶桑頌伏謁三茅氏却駕雲中龍來游人間世談𤣥蕊珠闕稽首張樂地調笑芙蓉笙聲飄鳳凰吹僕愧金門彥時聞玉簫偈方欣蘭苑晤忽念荷衣逝欲和瑶臺章幡然紫烟閉石室縈翠芝丹丘藹松桂望望勞豫心猶懷碧山契東平謁堯祠初政禮羣秩晨趨鄆隂郭稽古詢道源放勳夕徂落齊宮委華棁黼扆銷丹堊庭榛雊雉升裳蘚宗彝剝惟馨思可薦廢墜豫猶怍緬言垂衣時東狩兹方嶽儀像儼欽明聲容被綿邈茅茨遵曩儉階蓂傳舊朔遺澤紛在斯今皇仰先覺亦播康衢謡紹爾雍熙樂曲阜里謁廟解組辭鄆郭驅車循魯坰前登闕里近端仰素王靈猗蘭遺貞潔神宇鬱葱青時化洽十祀奎光浮四溟多儀殷廟享斯文傳壁經几筵猶設席容秩儼充庭所念迷塗者空瞻明德馨因䝉今獲客幽悱未遑寧靡靡寒冰至塗塗朝露零遄回馳驅意夙夜思儀刑洪範祠龍池禱雨獲應畣隱士劉文正暨邑中羣彥齊沐戒徒御星言趨綘壇屬兹愆陽序雩祀罄衷丹龍湫窅深閟神物時蜿蟠馨潔始云薦靈祈紛可干沛然感敷施霡霂濟多難淅淅在林畹冥冥被岡巒焦原幸沾濡庶類同欣歡鳴鸛集穹窒翔鱗躍紋瀾郊坰悅童耄庠孰慶衣冠所協詠歸趣方闕民俗安賡歌誦雲漢𤣥化奚能殫弔陳思王祠墓在東阿鄴都雄盛日英才妙七賢夫君照乘珠五色麗且鮮西園倡華藻東洛賦嬋娟游鸞翔朝旭芳蕖映碧漣始協棣華美寧虞箕豆煎桐圭空錫社銀海閉隂泉白楊翳荆榛狐兔穴其阡喟然兼山嘆肯企淮南仙贈劉宗弼司業赴浙西僉事晨頒錦花誥夕斂絳紗帷聊當持憲節詎是解逢衣笠澤山水妙吳江鱸鱖肥移舟發白下搖斾出江畿川寒葭葦靜天清鴻鴈飛勿念離羣速承明應復歸秋夜雜興呈涂典韱穎璿杓運西宇華月麗中楹坐知流序易瑶夜秋風生銀漢呈宵景金堂含夕情柔條栖湛露嘉蕙茁幽莖撫迹遂成感如何君逺征相思雲陽浦岧嶤限玉京鏡鸞停趙舞箏鳳歇秦聲寸心渺何極搖蕩如懸旌擬古魯連天下士夙藴匡屯材却敵愧論賞英聲騰九垓燕昭市駿骨樂毅趨風來虎戰躍中野名成真壯哉僕本江海人西登鳳凰臺感此千古意長吟屢興哀朝經夷門市夕醉髙陽杯揮戈拂倒影羲輪為之回寶匣絢青蓮龍文拭輕埃神光夜揮霍按舞何嫌猜騰驤為君舉頭掃浮雲開簡涂叔良朱仲雅二博士貞士多苦節考槃依澗陲叢蘭珮芳潔悅懌遂幽期至德無終逸明揚膺盛時兹焉開東閣俊乂相追隨列宿呈光彩翔飈清羽儀皇謨敷禹訓風雅泛周詩幸俾纖䝉器叨承陪絳帷何因永斯好介爾崇明禧寓官窰候鄺雄飛使回不至湛露晨未晞秋華被原隰征途夙已戒承命履遐邑桂水寒悠悠揚帆望不及川鱗想同泳羈羽尚云戢維楫乖素期臨流重於邑眷然沮溺耦詎灑楊朱泣惆悵芳菲情日暮空佇立秋月篇金商鳴素節瑶律留先秋始見西陵月嬋娟滄海頭清規臨夜滿澄影際天浮媚浦沈珠迥凝波淨練收常懸鳷鵲署初照鳳凰丘碧落宵同映銀潢曉共流梁園生綺夢陳榭感芳憂爽洽征人袂光含思婦樓玉臺情未已鸞鑑影空流詎惜盈虧屢仍知晦朔周關山隨别騎淇水送行舟願逐餘輝去蘭臺奉夕遊與伯貞或華二友會二妙聯英標眷言顧榛莽良晤諧夙心𤣥談慰幽愴江蘼淡新緑谷鶯聞逺響感此離索情浩蕩烟霞想夷白抗浮雲臨清延素賞何因繼芳躅一丘同偃仰題蒲澗讀書處編茅臨巨壑伐木憩幽龕搖琴初涉澗投册靜窺潭麗澤方求益知人諧所耽靈芬遙可挹淵物坐能探野褐聞朝誦霜猿聽夜談董幃凉結蕙管榻澗霏嵐豫志在山水宜從雲外參秋日懷友雲館秋氣凉前楹新雨歇凉飈振清籟炎景韜餘烈時菊有芳華露棠飄絳葉慨此搖落情於焉謬司業端憂鬒髮變和俗性靈竭貞履期可堅𤣥言詎當接渺渺睇川梁日暮方舟涉分韵得也字贈林生瑛充貢氷霜戒𤣥律游子發中野筵几惜離羣罍樽企傾寫庭柯復喧鳥場藿維征馬錫貢擬璆琳光輝孰云舍文淵穆奧典璧水觀儒雅攀鱗爾所之附驥吾衰也滔滔嵗華晚積雪晨飛灑行矣慎毋淹長懷問津者餞區伯寡領歸善邑教橫塘候秋色芳蕖颯已變渺渺波上舟忽如翔風燕琴觴激幽思籩豆徒有踐所念同襟者飄颻各鄉縣章縫協沖素况復斯文彥此邦多竒勝名山蔚葱蒨暄壑栖雲霞寒松閲霜霰爾行問津處沮溺因可見贈劉仁仲昆季還浙東沈憂自多緒復此送歸人昨夜淮南雨不知芳樹春朅來持别酒相與慰兹晨日暮行艫渺東南瀰越津七言古詩遊泰山今年初出承明班折腰從政青徐間神州二月雨新霽我來萬里觀名山名山泰岱連雲上鄒嶧徂徠鬱相望晨霞倣佛見丹崖旭日曈曨射青嶂羽服逍遙山際行垂蘿磐石漸回縈喬木千章寒谷秀隂泉百道曉虹明𤣥都太古瑶臺在石室丹爐長不改中林迢遰躡天門五色芙蓉耀光彩東極羣真鳴珮環招搖玉女開金關蒼龍飛去溟海濶黃鶴下唳清風還奎璧祥光生縹眇日觀扶桑擘昏曉登臨今日九州同顧視寧論萬山小名嶽齊天天下知齊宮䖍潔閟靈祗寶鼎椒蘭騰馥郁芝楹華蓋仰葳㽔祠官祝釐朝擊鼓玉童吹笙雙鳳舞魯祊秦祀變浮雲后土精靈夜相語功成世世未登封明堂駿奔朝岱宗翠華行處入歸鳥樛木盡亞隨飛龍微茫玉檢無人識緑壇隂洞秋聲急但聞松喬遺素書我欲因之蛻凡骨絶頂𤣥芝應再生神游早顧拋塵纓笑騎蒼兕驂太乙稽首銀臺超上清河渾渾洪武辛亥夏河
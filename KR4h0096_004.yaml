body:
  text: 廣州四先生詩巻四臨清詩選趙介字伯貞番禺人博通六籍雖厯官醫卜之説浮屠老子之書靡所不究氣宇豪邁與物無芥蔕興至即揮毫賦詩人莫測其涯也父璟元臨江路治中與母連喪介孤憤讀書遂無復仕進意植二松于所居軒扁曰臨清葢以淵明自儗也時有李韡者南海文士也以薦起介力止之謂曰堯天雖長劉日實短子獨不動髙堂念乎韡竟去後倅南康坐累歎曰伯貞真髙士也介行嘗以一囊自隨遇景即投詩其中絶不為人留題搢紳恒病其狷性復不喜接達官貴人日往還西樵石間獨與八十翁劉樂善相倡和以自娛屢為有司所薦皆苦辭免洪武乙巳以家累有㫖逮赴京師卒于舟中年四十六介顔如渥丹丰度類神仙中人尤善教子四子絜絢繹純皆有文名後純貴贈介為監察御史有臨清集行于世方孫蕡王佐結詩社南園時一時名士如李徳黄哲暨别駕黄楚金徵士蔡養晦黄希貢長史黄希文架閣蒲子文進士黄原善趙安中安中之弟通判澄徵士訥皆與焉豪吟劇飲更倡迭和文士宗之而介自成一家言世以蕡佐徳哲並之稱五先生云見廣州人物傳五言古長門宫翠華朝望迥長門夕思孤螢流金殿暝露下玉階蕪昔作鳴陽鳳今為繞樹烏愁顔空似玉咳唾不成珠寶鏡塵將滅羅裳色漸枯淚將寒漏水夜夜滴空壺步虚詞采采清露英皎潔玉不如元和合真一飲之極甘腴自然生羽翼何用登雲車迢迢霄漢上瓊臺曠清虚永從衆仙去天風揺珮琚寓山家留壁有客來何方駕言自華胥囊中無一物手把太極書象罔為我御鴻濛為我徒朝觀赤城標夕弄滄海珠去來了無碍所憩即安居青山出屋上脩竹當坐隅好鳥時一鳴景寂心亦虛泛泛巫峽舟迢迢太行車人心自髙下於我良晏如七言古詩懷仙吟題玉樞經巻後我昔采藥羅浮巔仙人招我遊諸天天門洞開三十六琳宮貝闕相連延瑶臺百丈空中起玉女燒香月明裏天王宴坐擁羣真環佩珊珊滿人耳中有一人號雷師龎眉皓首拜玉墀奏云侍從五千劫未聞至論窮𤣥機天王含笑揮玉拂舉首向空如畫一羣真意領寂不宣但見琪花散空碧我時目覩心欣然萬物得一天何言乃知至道本無物豈有文字人間傳人間所見皆幻影欲吸晨霞駐清景須臾月落仙馭旋蕋闕瑶臺風露冷回看閶闔不可攀白雲與我留山間倚劒長歌一壺酒龍吟萬壑松聲寒南樓對月夜上南樓看月色水晶簾捲銀河碧氷輪倒射滄波寒對此清光是何夕舉酒邀月遥相酬夜長不用秉燭㳺萬里凉風滿襟袖洞庭七澤涵清秋秋聲冷拂珊瑚樹湘娥鼓瑟鮫人語試吹玉管遏行雲曲中彷彿霓裳舞霓裳舞罷迴明璫北斗已挂西山傍但願清尊長對月今人古人何足傷七言絶句瑶池宴罷瑶池暮雨紅碧桃花落幾畨風重來八駿無消息儗逐青鸞入漢宮廣州四先生詩巻四

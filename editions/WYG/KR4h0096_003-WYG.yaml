body:
  text: 廣州四先生詩巻三聴雨詩選王佐字彦舉家世本河東元末侍父宦南雄後遂占籍南海時孫蕡與佐結詩社于南園開抗風軒以延一時名士佐才思雄渾體裁甚工蕡甚重之時謂搆辭敏捷王不如孫句意沈着孫不如王云會何真開署求士與蕡首被禮聘真敬二人者使掌書記軍旅事多見咨詢洪武六年部使者薦于朝謂佐有才學當備顧問徵至京師拜給事中論思補闕恒稱上意學士宋濓嘗拜賜黄馬上為歌命諸詞臣和之佐斯須而就有臣騎黄馬當赤心之句上覽之而喜賜鈔一錠上游幸或遇會心處多命之賦詩劉三吾嘗同詠署中桂驚其才語髙妙以為名世之作其為名流所重如此佐性不樂樞要居官二載即乞骸骨上憐其誠特俞所請陛辭日賜鈔五十千以為道路費士林羨之葢天威嚴重臣僚自陳者多被譴斥十人而九佐以恭順得歸故當時以為難云佐天性孝悌父沒時有廖元正為料理喪事殯諸南雄之五里山終身事之如父既貴後元正之子犯法復以己資贖之終身哀慕形於著述有聴雨集瀛洲集多散逸郡人彭森刻於建安者僅詩一巻評者比之髙適岑參見廣州人物傳七言古詩應制賜宋承㫖馬聖明天子齊唐虞四方混一同車書大宛西域總臣附萬馬入貢皆名駒天閑十二森成列牝牡驪黄色俱别羅帕輕籠錦作韀絲韁穏鞚金為勒玉堂學士真老臣日日趨朝侍紫宸承恩特賜飛黄馬騎出通衢不動塵飛黄之精直天駟四足騰驤若星駛况拜親題御製詩奎璧垂芒照人世須知君恩如海深臣騎黄馬當赤心風雲會遇有如此彤筆宜書煥古今唐仙方伎圖開元天子承平日錦繡山河壯京室金殿璇題表集賢玉屏粉繪圖無逸䕫龍接武居阿衡萬方旭日當文明衡山老僊何所有亦復通籍承恩榮縞衣白髮酡顔老自説時來致身早綵篋初開玉仗分白騾突出銀鞍小榻前製號賜通𤣥始信人間别有天樓船未遣蕋珠賜嵗籥俄更天寶年九齡歸卧曲江上牛郎又入中書相花雨香飄蘭若鐘柳雲春撲金雞帳萬機日少樂事多梨園法譜聲相和鬭雞舞馬看不足不獨仙人呈白騾仙人豈是呈仙技畫者傳之有深意延秋門外羽書飛却駕青騾向西避青騾劒閣雨淋鈴一段閒愁尚不勝不道畫圖今若此碧雲芳樹滿昭陵題桑直閣江山勝槩圖我昔趨神京道出匡廬峰手持緑玉杖遍踏金芙蓉是時秋髙天氣肅最愛秋聲滿巖谷萬頃湖光帶白蘋九疊屏風掛飛瀑結巢便欲栖雲間䕫龍趨赴鵷鸞班才名用世果何有嬴得歸來雙鬢斑至今夢想烟霞􅃐擬托毫縑寫情素君家此圖誰所摹似我當時舊游處逺山縹緲如游龍好處盡在烟嵐中晴波落日曳澄練枯林老葉鳴秋風屠蘇髙下林間起水色山光畫圖裏軟紅無路到柴扉空翠常時撲書几中流放棹知何人錦袍坐岸方烏巾若非髙潔魯連子應是風流賀季真我生垂老願未酬魯人詎識東家丘圖中勝概倘易致便從此地營菟裘五言律詩戊戌客南雄寂寞江城晚依依獨立時迴風低鴈鶩返照散旌旗家在無人問愁來只自知幾回揮涕淚忍誦北征詩憶舍弟彦章庭艸秋仍緑江楓晚漸稀年光隨水去事業與心違逺海猶傳箭殊方未授衣翩翩南去鴈故作一行飛七言律詩和元正見寄早嵗承書問草萊忍將懷抱向人開秋霜荆棘闗頭墓寒雨鈎輈海上臺鬚鬢已從青鏡改夢魂曾逐片帆回天涯一掬思親淚待洒瀧阡萬樹梅酬孫典籍仲衍見寄憶昨交游日罄懽清時曾擬共彈冠春風艸檄將軍幕夜月聯詩羽客壇江海只今來逺信雲霄無復望飛翰惟應賸釀陶尊酒遲爾歸來共嵗寒發龍灣别王惟吉張廷彦日日摛毫紀玉音敢期清夢到山林賈生對䇿曾前席疏傳歸來更賜金日月行瞻丹闕迥烟霞歸去草堂深相看已是康衢叟擊壤無忘報國心舟次匡廬寄同朝諸公翰墨同時侍禁闈恩榮寧謂及寒微舍人舊掌絲綸誥御史新裁錦繡衣天上鵷鸞還接武江邊鷗鷺已忘機他時行部如相覔秋水蘆花是釣磯午日呈鄭久誠㕘政百頃芙蓉罨畫船賀家湖上水平天金盤送果沈冰碗羅扇題詩散舞筵往事氛埃成逺夢佳辰風雨憶華年澗蒲九節根如玉服食于今笑學仙七言絶句題李谷清雪景梁園飛雪玉繽紛坐列金貂酒半醺借問當時誰授簡相如詞賦最凌雲百馬圖蹄影㕘差踏軟紅曾觀萬馬擁飛龍旌旗不動金笳歇一片川原錦繡中竹枝詞竹林塘西越女歸雙雙采蓮歌夕暉蘭舟蕩槳忽分去兩岸風花髙下飛美人紅葉圖謝家夫人詠柳絮黄陵女兒歌竹枝誰信長門秋澹澹西風黄葉斷腸詞廣州四先生詩巻三

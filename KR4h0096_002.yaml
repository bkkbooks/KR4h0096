body:
  text: 廣州四先生詩巻二易菴詩選李徳字仲脩番禺人博覽羣籍尤邃於經學明毛詩尚書洪武庚戌以明尚書薦至京師上親䇿問賜徐大全等出身有差徳預焉授洛陽長史繼遷濟南西安二郡幕非其好也政暇遍覽帝王遺墟嘗著論西安南陽皆天下大形勝所在建不拔之基當擇而都之江東非其匹也士林韙其識歴郡十餘年年薄暮矣自陳不能吏乃就湖廣漢陽教諭當兵革初靜􅓺舍翳蓬藿中生徒僅十數輩皆野獷不可語徳盡心訓迪之言諸有司羅致民間子弟之俊穎者館穀焉自是絃誦詵詵人知向學矣秩滿改任廣西義寧縣其俗尤陋徳立法凡遇家有吉㓙事當告假者隨貧富以楮幣周之孜孜勤諭使約束鄉黨不得為惡習俗日美科貢漸盛當道方薦達之而徳以倦游南歸卒于家徳為詩多效長吉太白孫蕡笑之曰子真混元皇帝逺孫也徳乃力追古作有易菴集行于時序者以為跨晉唐而躒宋元云少嘗自號采真子著論如子書晚更潛心伊洛故世稱有理學者必曰李長史子孚字底信亦能詩見廣州人物傳五言古詩神釋大哉渾淪妙槖籥自無窮絪緼一已搆畀付出至公靈臺本無物而我處其中清虛為我體昭明為我庸儵忽入無間忽來歸寂空既作百骸長蔚為萬世宗毋從衆形擾順適與天通雜詩人生更代謝闔闢為之機盛衰無常理生死乃其宜始來本自無終往奚足悲擾擾依形立百嵗以為期黽勉返吾初俟命復奚疑孟夏五日感興春陽舍我去四序無時停鬱鬱當軒柳珍禽時一鳴素琴寓我適濁酒陶我情顔鬢雖云改寸心有所憑偃仰東牕下聊以寄吾生種麻種麻滿東園種花亦盈畝麻生但芃芃華發映户牖容華能幾時零落他人手豈如為絺綌與君同永久向來灼灼姿于今復何有送友回真定君自邯鄲來復向邯鄲去邯鄲月色好夜照江南樹太行多峻坂中有羊腸路往來不憚煩知君為親故暇日遊城西𤣥妙觀還辭束帶累偶涉尋真路松吹度鈞天篆烟生細霧翩翩塵外侣杳杳雲中步儒道雖異途同歸在清素紫芝山房為湖廣鄭大㕘賦芝山何嶤嶤燁燁産靈秀美人慕園綺闢地敞雲構圖書資悦懌枯壑含昏晝佳氣藹川原和風散巖岫松蘿被廣䕃泉澗環清潄抱冲昔若遺理劇今豈後鍾英良有自瑞世非常覯明良共一時千載此其候嵗月徂遷未有歸止寓迹江漢懷抱索然時維抄秋凄其絺綌偶有所述用簡同志抄秋氣方肅寒風動凉户羈人未授衣適體寧捐故雲開漢臯路目送征鴻度山容欲受寒園芳已漙露故交久零落新知偶愜素時資盍簪益聊以慰遲暮仙人瀛洲飛彩雲萬樹桃花春翩翩騎鳳侶恐是避秦人側窺渾淪妙幽探元化真徒令多欲者千古恨迷津贈虛明道人渾沌無本象表裏同一照古今若須臾羣真資衆妙五隂絶纖翳幽陽播靈耀王喬并羨門吾與爾同調同詩社諸公遊白雲寺分韻得千字捫蘿扣禪闗長嘯青雲顛山開西北日水豁東南天凉葉散虛席暝林啼清猿浮雲觸石起頃刻遍大千悟言造真適談空忘至言何當登絶頂俯視蒼蒼烟留題郎步山莊出門望南山山翳林木稠飛鳥欣有託吾生念歸休行行度前坂褰裳涉荒溝好風吹我懷禾黍亦盈疇人生衣食爾過此欲何求日夕返窮廬聊以忘吾憂宿栖雲菴衆壑忽已暝逺近響清湍山中對僧定疎雨掩柴闗柳暗猿狖集氣交風露寒攬衣中夜起蘿月在巖端閒居北牕林影寂南湖水氣凉園荷始泛緑叢蘭漸吐芳撫節迹猶滯神閑機已忘無論喧與寂緬心即羲皇憶南園南園蝴蝶飛緑草迷行跡青鏡掃長蛾娟娟弄春碧錦屏千里夢寂寞愁芳色小字寫長箋鱗鴻坐相隔栖雲菴石室凝紫烟空洞懸石乳隂崖含風泉終日灑飛雨臨流結精舍六月不知暑道人養清虚適與髙僧處垢淨俱已忘孰為舍與取諸幼既逺離白雲日相與何當謝時人來作塵外侣對鸚鵡洲芳洲采杜蘅日夕春水生不特嗟鸚鵡深令憶禰衡因悲才勝者祇使寸心驚題陶淵明像淵明節概士逺慕羲皇風榮名奚足道甘分固其窮得酒即為歡簞瓢常屢空朝出山澤遊暮歸衡宇中豪華非所貴但願嵗時豐秋菊或盈園栖栖誰與同濁醪共斟酌日入會田翁此士不再得吾生焉所從亭亭水上蕖亭亭水上蕖皎皎沼中藕花落子亦成色衰心不朽中藏千萬渚處汚恒自守不學楊白飛隨風入牕牖柳塘書舍圖逺山出白雲近水明秋色煙波漫浩浩日暮歸舟急隠約叢薄間茅茨倚蒼石中有柳塘翁看看似相識觀白鷺河州雙白鷺皎皎照清流所希在鮮食所願亦易酬朝飛浦溆曠暮宿林塘幽寄言採薇客吾與爾同遊七言古詩寄孫典籍仲衍南園草色參差緑忽憶佳人美如玉玉堂揮翰事成陳草屋懸燈照幽獨江湖狂客未言歸翹首東南淚濕衣何時淨拂青溪石與爾横竿釣落暉河陽月簡顔光宏胡角啾啾悲石裂顔郎夜醉河陽月越姬颯沓舞秋風蘆筍含商五情熱請看天上青雲道桂花落盡霜娥老雌鸞鴛鷺玉樓寒三尺青絲變秋草燕歌行秀頸紅唇臉花碧秋波湛湛傾人色髙樓霧煖四時春蝴蝶飛來歸不得裾迴縠轉香風催引商按徵聲徘徊鳴鐘考鼓玉山頽詎識樂極生悲哀青樓曲青樓春酣鸚鵡杯孔雀屏風錦繡開銀鸞玉鳳嬌未歇楊柳斜飛舞迴雪越娘含醉弄絲桐十纖宛恨哀絃中調成白雪惱芳容長卿茂陵髪如蓬汪彦舉南雄省親神工剪水寒凝指南浦頽雲吹不起汪郎氣酣走馬去三尺龍泉拂流水玉壺愁破酒如兵鵝管嗚嗚咽不鳴幽紅啼露香凝幙蜀錦縫衣寄君著象牀醉卧紫氍毹鳳簡封題草字書北樹南雲一千里願攜徑尺託雙魚秋情爉炬揺紅紗隙凍沈香帳底鴛鴦夢芙蓉波冷薄霜凝一夜離鸞憶單鳳梧桐金井曙啼鴉夢郎封侯歸妾家開門自掃枇杷花天上謡玉樓瓊宇曉玲瓏雲軿電轂輾迴風自從羿射九日落帝遣羲和驅六龍六龍奔屬成今古海水生塵變桑土瀛洲花發幾畨春誤殺秦皇并漢武桂宮珠露滴秋香仙仗徘徊朝紫皇鳳吹紛紛九成奏羽衣金節韻琳瑯金河流水連雲注織女牛郎在何處淋漓元氣浩茫茫白鶴千羣駕烟霧女媧鍊石良可嗤此事荒唐奚足疑直憐世上人心改至理渾侖那得移房中思金井鳥啼風摵摵桂樹團團江月白洞房秋思滿嬌娥淚滴珊瑚眠不得玉臺塵鑑少光輝彷彿孤鸞彩翼垂蓮枯蕙折無人惜露濕綺疏生網絲十二月樂章正月東方日出香茸茸長條短條花眼紅柔雲弱雨暗填空茫茫蝴蝶破春風鸞帕抹烟仙夢濃蕭颯愁思開暝容江頭溘溘水聲動微和著柳黄金重二月燕梁𤣥玉濕蜂蜜花房曉銅龍嚙水微翡翠含波小石間蘚蝕菖蒲根古魂啾啾啼曉昬紅芳碧蕋亂殷殷蠻女剪烟揷翠雲游絲縈春懸錦綺渚閑沙白鴛鴦喜三月花斂容柳刷翠扇薄欲裁紈珮香思剪蕙桐英寂寂沈寒波粉緑猗猗日影多六街烟花淨如掃千年古血生青草四月碧雲屯午風熏熏五絲曲奏𤣥霜紋湘臯野龍拔新玉摧鱗健角蕭蕭緑蕙香小妓扇輕羅半掩櫻唇試新穀金丸落落絃紅脂石池青鈿溢碧猗五月沙上短蒲緑赤菱紫茨離披熟越奴青髮艾懸香踏踏采蓮塘上曲游龍撇波海水飛黄頭伐鼓吹參差少年揺曳澹忘歸六月皇天髙厚地裂白日河庭泣魚鼈湘神抱瑟愁波濤頽陽畢化穉隂結焉知海上黄金闕萬丈丹梯到寥泬喬松相攜弄白雪七月桐風刮帳無春温赤精解綬佩金神銀浦橋成鵲濟津遥遥帝子度長雲野芳萋萋日杲杲十萬蛾眉鏡中老錦樓折竹夜迎仙越秀吳都朽不眠八月玉露漙清虛銀雲擁明月空濛白夜凉逺近商聲發桂子落秋香寒娥能孤潔誰家理素琴調急絃應絶九月清飈激素商逺客生歸夢茱萸委匣香玉腕勝金重幽芳垂晚逕汲綆霜華凍洞庭木葉空臨水悲相送十月沈寒凝海霜班班蘆鴻呌徹蒼梧間仙雞警曉蟠桃乾天鼓無聲澤龍閒十一月軒轅玉管還初氣綵線紆迴報長至瑶花散落滿寥天萬户千門夜明媚南山幽翠淨如削内屋紅爐春自若璿璣迴斡見天心姬氏騎龍班嵗朔十二月北斗璇光射幽土四氣縁環若朝暮壑底驚蛇挽不留官街力獸䭾寒去閏月嬴皇當極黄楊死一寸霜皮生不起嶧陽老榦青銅根玉葉排秋十三子鬱華羿妃緩兩轡遲回二萬八千二春秋九十短長匀青紅白黑上下均千秋萬嵗奉明君出城越王宮春風起何處散芳塵垂揚沙逕裏舞羅衣揮鳳尾鳴鸞簫發貝齒懷洞庭悲帝子海波竭彭鏗死羲和影如流水梅花曲軒后登天時騎龍乗紫雲三千宮貌附龍鱗瑶璫月佩荷絲裙夜入羅浮醉僊子酒樓明月清如水夢闌霜冷蛾眉死送友人闗雲櫛櫛吹沙黄瑶華拂劒春風香鵝黄淺泛玻璃光越妓舞衫金縷長江津白白黄灣月神魚撇波龜甲裂湘娥凝緑染春衣踏踏青雲郎馬歸五言律立秋日登漢陽朝宗樓懷鄉中諸友湖山興不淺而我亦淹留得罪縁微禄懷君屬早秋淡雲鄉樹逺孤月旅情幽借問衡陽鴈何時到廣州濟南寄孫仲衍南園虚夜月風景罷登臨鞏洛成塵跡青齊入苦吟升沈彫壯節匡濟負初心薄宦容身得寧辭雪滿簪金陵逢趙汪中十年長契濶萬里各分飛岐路風烟杳江湖消息稀加餐俱努力訪舊各沾衣春草無勞緑王孫自不歸峽山寺峽雲藏絶壁峽水積寒流寶樹籠香閣天花散彩樓梵音晴隠隠鐘韻晚悠悠聞道金仙宅飛來最上頭七言律春興六首萬里春風二月花十年塵土一烏紗惟將素節酬知己豈有黄金買嵗華愁邊熟食無烟火江上堅城有皷笳憶我舊游如舊日繡簾青舫越天涯終南山色翠含烟太白峰髙尺五天春煖鶯花連萬室月明笙鶴會羣仙黄塵白髪三千里流水浮雲十二年齊楚飄零成潦倒令人猶自憶秦川洛陽城裏雪初消流水天津尚有橋漢寢隋陵春寂寞龍門伊闕晚岧嶤相如完璧無遺恨王子吹笙擬見招為報山人体索價可能容我伴漁樵日射天門萬象新綉衣朱履侍楓宸雲移仙仗千官肅日映龍顔四海春金椀玉漿來内侍紫泥丹詔下王人十年趨走金陵道到老低垂漢水濱漢水東流日向西孤村烟樹鷓鴣啼纖纖岸艸迎人眼踏踏江花映馬蹄有客問竒仍載酒故人相過輒留題暮年正爾逢知己布襪青鞋信杖藜江漢漂零今六載故園迢遞尚三千新春隠几㸔雲坐遥夜懸燈聴雨眠彭澤官貧猶有酒杜陵身老未歸田桃花流水深千尺擬向溪頭理釣船社後謾興社燕西飛節物過年華世事兩蹉跎晴天白鳥來無數落日浮雲看漸多黄菊何人歸短棹紅蕖秋水澹洪波寂寥多恨憑誰遣揺落無心奈爾何寄妻弟鄭子玉年年留滯漢江頭華髮蕭蕭不奈秋夢斷鄉關猶是客望窮烟水更登樓西風鴻鴈來芳信南紀親朋憶舊遊聞道菊松無恙在可能歸去覔菟裘五言絶句塘上行露濕藕花香花折藕絲長豈無鳬與鴈不似錦鴛鴦七言絶句題扇凉風吹動影娥池百頃秋波漾素輝十二玉闌閑倚徧桂花清露濕人衣廣州四先生詩巻二
